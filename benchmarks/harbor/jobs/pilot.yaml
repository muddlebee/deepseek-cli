job_name: doku-terminal-bench-pilot
jobs_dir: benchmarks/harbor/jobs/output
n_attempts: 1
timeout_multiplier: 1.0
orchestrator:
  type: local
  n_concurrent_trials: 2
  quiet: false
environment:
  type: docker
  force_build: true
  delete: true
  env:
    DOKU_API_KEY: ${DOKU_API_KEY}
    DOKU_BASE_URL: ${DOKU_BASE_URL}
    DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
agents:
  - name: doku
    import_path: doku_agent.agent:DokuAgent
    model_name: deepseek/deepseek-chat
    kwargs:
      max_turns: 80
      timeout_sec: 1800
      npm_spec: doku-deepseek-cli
datasets:
  - path: terminal-bench@2.0
    limit: 10
